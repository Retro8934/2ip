<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой IP, Провайдер и Браузер</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 24px 0;
            color: #222222;
            text-align: center;
            font-weight: 700;
        }
        .row {
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f2f5;
        }
        .row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8c96a3;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.6px;
        }
        .value {
            font-size: 17px;
            font-weight: 600;
            color: #111111;
            word-break: break-all;
        }
        #ip {
            color: #007aff; /* Фирменный синий цвет */
            font-size: 20px;
        }
        /* Анимация пульсации во время загрузки */
        .loading {
            display: inline-block;
            width: 120px;
            height: 18px;
            background: linear-gradient(90deg, #f0f2f5 25%, #e4e7eb 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Окно перекрытия для ошибок и VPN */
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 10;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            border-radius: 16px;
            text-align: center;
        }
        .alert {
            background-color: #ffeef0;
            color: #d9383a;
            border: 1px solid rgba(217, 56, 58, 0.15);
            padding: 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="screenOverlay" class="overlay">
        <div id="alertBox" class="alert">Синхронизация данных...</div>
    </div>

    <h1>Данные подключения</h1>
    
    <div class="row">
        <span class="label">Ваш IP-адрес</span>
        <span id="ip" class="value"><span class="loading"></span></span>
    </div>
    
    <div class="row">
        <span class="label">Интернет-провайдер</span>
        <span id="isp" class="value"><span class="loading"></span></span>
    </div>

    <div class="row">
        <span class="label">Геолокация (Страна, Город)</span>
        <span id="location" class="value"><span class="loading"></span></span>
    </div>

    <div class="row">
        <span class="label">Ваш браузер</span>
        <span id="browser" class="value">Определение...</span>
    </div>
</div>

<script>
    const overlay = document.getElementById('screenOverlay');
    const alertBox = document.getElementById('alertBox');

    function showError(text) {
        alertBox.innerHTML = text;
        overlay.style.display = 'flex';
    }

    function hideError() {
        overlay.style.display = 'none';
    }

    // Парсинг User-Agent для определения точного браузера
    function detectBrowser() {
        const ua = navigator.userAgent;
        if (ua.includes("Yowser") || ua.includes("YaBrowser")) return "Яндекс Браузер";
        if (ua.includes("Opera") || ua.includes("OPR")) return "Opera";
        if (ua.includes("Edg")) return "Microsoft Edge";
        if (ua.includes("Chrome") && !ua.includes("Chromium")) return "Google Chrome";
        if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
        if (ua.includes("Firefox")) return "Mozilla Firefox";
        return "Мобильный или встроенный браузер";
    }

    async function initNetworkCheck() {
        // Выводим локальное имя браузера (сеть для этого не нужна)
        document.getElementById('browser').innerText = detectBrowser();

        // Проверяем, есть ли интернет у устройства в принципе
        if (!navigator.onLine) {
            showError("❌ Интернет отсутствует.<br>Проверьте сетевой кабель или Wi-Fi.");
            return;
        }
        hideError();

        try {
            // Запрос к Sypex Geo по шифрованному каналу HTTPS
            const response = await fetch('https://api.sypexgeo.net/json/');
            if (!response.ok) throw new Error('Шлюз не отвечает');
            
            const data = await response.json();
            const currentIp = data.ip;

            // Выводим IP и локацию на русском языке
            document.getElementById('ip').innerText = currentIp;
            const country = data.country ? data.country.name_ru : "Не определена";
            const city = data.city ? data.city.name_ru : "Не определен";
            document.getElementById('location').innerText = `${country}, ${city}`;

            // Запрашиваем информацию об ASN / провайдере вторым быстрым фоновым потоком
            let providerName = "Местный интернет-провайдер";
            try {
                const ispResponse = await fetch(`https://ipapi.co/${currentIp}/json/`);
                if (ispResponse.ok) {
                    const ispData = await ispResponse.json();
                    providerName = ispData.org || ispData.asn_org || providerName;
                    
                    // Умная сверка на наличие включенного VPN
                    const localTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    if (ispData.timezone && localTimezone !== ispData.timezone) {
                        showError("⚠️ Обнаружен включенный VPN!<br>Пожалуйста, выключите его, чтобы сайт работал нормально.");
                        return;
                    }
                }
            } catch (e) {
                // Если база провайдеров заблокирована AdBlock-ом, оставляем дефолтное имя
                providerName = "Определен автоматически";
            }
            
            document.getElementById('isp').innerText = providerName;

        } catch (error) {
            console.error(error);
            showError("❌ Ошибка загрузки данных.<br>Запрос заблокирован вашей системой безопасности.");
        }
    }

    // Автоматическая реакция на появление/исчезновение интернета в процессе
    window.addEventListener('online', initNetworkCheck);
    window.addEventListener('offline', () => showError("❌ Интернет отсутствует.<br>Проверьте подключение."));

    // Инициализация при старте
    window.onload = initNetworkCheck;
</script>

</body>
</html>
