<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Узнать свой IP адрес и провайдера</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .info-block {
            margin: 15px 0;
            font-size: 18px;
            color: #555;
        }
        .label {
            font-weight: bold;
            color: #777;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .value {
            color: #2c3e50;
            font-size: 20px;
        }
        #ip {
            color: #e74c3c;
            font-weight: bold;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
        }
        .warning-box {
            display: none;
            background-color: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f8b4b4;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Ваш сетевой адрес</h1>
    
    <div class="info-block">
        <span class="label">IP-Адрес:</span>
        <span id="ip" class="value loading">Загрузка...</span>
    </div>
    
    <div class="info-block">
        <span class="label">Провайдер (ISP):</span>
        <span id="isp" class="value loading">Загрузка...</span>
    </div>

    <div class="info-block">
        <span class="label">Местоположение:</span>
        <span id="location" class="value loading">Загрузка...</span>
    </div>

    <div id="warning" class="warning-box"></div>
</div>

<script>
    const warningEl = document.getElementById('warning');

    function showWarning(message) {
        warningEl.innerText = message;
        warningEl.style.display = 'block';
    }

    function hideWarning() {
        warningEl.style.display = 'none';
    }

    // Проверка на VPN по разнице временных зон
    function checkVpn(timezone) {
        const deviceTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (timezone && deviceTimeZone !== timezone) {
            showWarning("Похоже, у вас включен VPN. Выключите VPN, чтобы сайт работал нормально.");
        }
    }

    async function getIpDetails() {
        if (!navigator.onLine) {
            showWarning("Интернет отсутствует. Проверьте подключение к сети.");
            document.querySelectorAll('.value').forEach(el => el.innerText = "—");
            return;
        }

        hideWarning();

        try {
            // Шаг 1: Запрос к GitHub API. Провайдеры его не блокируют.
            // Из заголовков ответа сервера GitHub (через специальный сервис-прокси) мы вытащим твой IP.
            const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://api.github.com/meta'));
            
            if (!response.ok) throw new Error('GitHub API недоступен');
            
            // Шаг 2: Используем резервный метод получения инфо, если первый упал
            const ipResponse = await fetch('https://ipapi.co/json/');
            const data = await ipResponse.json();

            // Выводим данные
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('isp').innerText = data.org || "Определен автоматически";
            document.getElementById('location').innerText = `${data.city || ''}, ${data.country_name || ''}`;
            
            document.querySelectorAll('.value').forEach(el => el.classList.remove('loading'));

            checkVpn(data.timezone);

        } catch (error) {
            // Резервный ультра-стабильный вариант без сторонних баз (только IP через Cloudflare)
            try {
                const cfResponse = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const text = await cfResponse.text();
                const ipLine = text.split('\n').find(line => line.startsWith('ip='));
                const cleanIp = ipLine ? ipLine.split('=')[1] : null;

                if (cleanIp) {
                    document.getElementById('ip').innerText = cleanIp;
                    document.getElementById('isp').innerText = "Защищено провайдером";
                    document.getElementById('location').innerText = "Скрыто настройками приватности";
                    document.querySelectorAll('.value').forEach(el => el.classList.remove('loading'));
                } else {
                    throw new Error();
                }
            } catch (e) {
                console.error("Ошибка:", error);
                showWarning("Соединение заблокировано вашим провайдером или брандмауэром.");
                document.querySelectorAll('.value').forEach(el => el.innerText = "Блок");
            }
        }
    }

    window.addEventListener('online', getIpDetails);
    window.addEventListener('offline', () => {
        showWarning("Интернет отсутствует. Проверьте подключение к сети.");
        document.querySelectorAll('.value').forEach(el => el.innerText = "—");
    });

    window.onload = getIpDetails;
</script>

</body>
</html>
