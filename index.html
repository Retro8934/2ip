<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2IP Аналог — Проверка Сети</title>
    <style>
        /* Современный адаптивный дизайн без внешних тяжелых шрифтов */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            color: #1c1e21;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 24px 0;
            color: #222222;
            text-align: center;
            font-weight: 700;
        }
        .row {
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid #f0f2f5;
        }
        .row:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .label {
            font-size: 11px;
            text-transform: uppercase;
            color: #8c96a3;
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 0.6px;
        }
        .value {
            font-size: 17px;
            font-weight: 600;
            color: #111111;
            word-break: break-all;
        }
        #ip {
            color: #007aff; /* Акцентный синий цвет для IP */
            font-size: 20px;
        }
        /* Сверхлегкий CSS-эффект загрузки ( Shimmer ) */
        .loading {
            display: inline-block;
            width: 140px;
            height: 18px;
            background: linear-gradient(90deg, #f0f2f5 25%, #e4e7eb 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Окно полной блокировки экрана для VPN и ошибок */
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 10;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
            border-radius: 16px;
            text-align: center;
        }
        .alert {
            background-color: #ffeef0;
            color: #d9383a;
            border: 1px solid rgba(217, 56, 58, 0.15);
            padding: 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <div id="screenOverlay" class="overlay">
        <div id="alertBox" class="alert">Анализ безопасности сети...</div>
    </div>

    <h1>Информация о подключении</h1>
    
    <div class="row">
        <span class="label">Ваш IP-адрес</span>
        <span id="ip" class="value"><span class="loading"></span></span>
    </div>
    
    <div class="row">
        <span class="label">Интернет-провайдер</span>
        <span id="isp" class="value"><span class="loading"></span></span>
    </div>

    <div class="row">
        <span class="label">Страна и город</span>
        <span id="location" class="value"><span class="loading"></span></span>
    </div>

    <div class="row">
        <span class="label">Ваш браузер</span>
        <span id="browser" class="value">Определение...</span>
    </div>
</div>

<script>
    const overlay = document.getElementById('screenOverlay');
    const alertBox = document.getElementById('alertBox');

    function showError(text) {
        alertBox.innerHTML = text;
        overlay.style.display = 'flex';
    }

    function hideError() {
        overlay.style.display = 'none';
    }

    // Безошибочное ручное определение браузера по юзер-агенту
    function detectBrowser() {
        const ua = navigator.userAgent;
        if (ua.includes("Yowser") || ua.includes("YaBrowser")) return "Яндекс Браузер";
        if (ua.includes("Opera") || ua.includes("OPR")) return "Opera";
        if (ua.includes("Edg")) return "Microsoft Edge";
        if (ua.includes("Chrome") && !ua.includes("Chromium")) return "Google Chrome";
        if (ua.includes("Safari") && !ua.includes("Chrome")) return "Safari";
        if (ua.includes("Firefox")) return "Mozilla Firefox";
        return "Мобильный или встроенный браузер";
    }

    async function loadProjectData() {
        // Браузер определяем мгновенно локально
        document.getElementById('browser').innerText = detectBrowser();

        // Проверка: есть ли интернет на самом ПК/телефоне
        if (!navigator.onLine) {
            showError("❌ Интернет отсутствует.<br>Проверьте подключение к Wi-Fi или сетевой кабель.");
            return;
        }
        hideError();

        try {
            // Запрос по HTTPS к надежному независимому гео-шлюзу ipapi.co
            const response = await fetch('https://ipapi.co/json/');
            
            if (!response.ok) throw new Error('Шлюз заблокирован провайдером');
            
            const data = await response.json();
            if (data.error) throw new Error(data.reason);

            // 1. Умный детект включенного VPN
            const deviceTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const ipTimezone = data.timezone;
            const currentOrg = (data.org || '').toLowerCase();
            
            // Проверяем подмену часового пояса или маркеры хостинга в названии провайдера
            const hasVpnKeywords = currentOrg.includes('vpn') || currentOrg.includes('hosting') || currentOrg.includes('server') || currentOrg.includes('datacenter');

            if ((ipTimezone && deviceTimezone !== ipTimezone) || hasVpnKeywords) {
                showError("⚠️ Обнаружен включенный VPN!<br>Пожалуйста, выключите VPN, чтобы сайт работал нормально.");
                return; // Полностью останавливаем вывод данных на экран
            }

            // 2. Если всё отлично — выводим данные в интерфейс
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('isp').innerText = data.org || data.asn_org || "Автоматический провайдер";
            document.getElementById('location').innerText = `${data.country_name}, ${data.city || 'Регион определен'}`;

        } catch (error) {
            console.error(error);
            // Если шлюз упал (например, жесткий корпоративный файрвол) — пробуем вытащить хотя бы чистый IP
            try {
                const fallback = await fetch('https://api.ipify.org?format=json');
                const fallbackData = await fallback.json();
                document.getElementById('ip').innerText = fallbackData.ip;
                document.getElementById('isp').innerText = "Защищено брандмауэром";
                document.getElementById('location').innerText = "Определено автоматически";
            } catch (e) {
                showError("❌ Ошибка загрузки.<br>Провайдер заблокировал внешние сетевые запросы сайта.");
            }
        }
    }

    // Слушатели для отслеживания сети "на лету" без перезагрузки вкладки
    window.addEventListener('online', loadProjectData);
    window.addEventListener('offline', () => {
        showError("❌ Интернет отсутствует.<br>Проверьте подключение к сети.");
    });

    // Автостарт при открытии страницы
    window.onload = loadProjectData;
</script>

</body>
</html>
