<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Узнать свой IP адрес и провайдера</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .info-block {
            margin: 15px 0;
            font-size: 18px;
            color: #555;
        }
        .label {
            font-weight: bold;
            color: #777;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .value {
            color: #2c3e50;
            font-size: 20px;
        }
        #ip {
            color: #3498db;
            font-weight: bold;
        }
        .loading {
            color: #7f8c8d;
            font-style: italic;
        }
        /* Стили для плашки критической ошибки (VPN / Нет сети) */
        .alert-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .alert-box {
            background-color: #fde8e8;
            color: #e74c3c;
            border: 2px solid #f8b4b4;
            padding: 20px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="alertOverlay" class="alert-overlay">
        <div id="alertMessage" class="alert-box">Проверка системы...</div>
    </div>

    <h1>Ваш сетевой адрес</h1>
    
    <div class="info-block">
        <span class="label">IP-Адрес:</span>
        <span id="ip" class="value loading">Загрузка...</span>
    </div>
    
    <div class="info-block">
        <span class="label">Провайдер (ISP):</span>
        <span id="isp" class="value loading">Загрузка...</span>
    </div>

    <div class="info-block">
        <span class="label">Местоположение:</span>
        <span id="location" class="value loading">Загрузка...</span>
    </div>
</div>

<script>
    const overlay = document.getElementById('alertOverlay');
    const alertMsg = document.getElementById('alertMessage');

    function showAlert(message) {
        alertMsg.innerHTML = message;
        overlay.style.display = 'flex';
    }

    function hideAlert() {
        overlay.style.display = 'none';
    }

    // Главная функция детекта VPN и получения IP
    async function checkNetworkAndIp() {
        // 1. Проверка физического интернета
        if (!navigator.onLine) {
            showAlert("❌ Интернет отсутствует!<br>Проверьте подключение к сети.");
            return;
        }

        hideAlert();

        try {
            // 2. Запрос к ультра-стабильному шлюзу Cloudflare (его не блокируют)
            const cfResponse = await fetch('https://1.1.1.1/cdn-cgi/trace');
            if (!cfResponse.ok) throw new Error('Блокировка соединения');
            
            const text = await cfResponse.text();
            
            // Парсим данные от Cloudflare
            const lines = text.split('\n');
            const data = {};
            lines.forEach(line => {
                const parts = line.split('=');
                if (parts[0]) data[parts[0]] = parts[1];
            });

            const userIp = data.ip;
            const ipColo = data.colo; // Показывает дата-центр, через который идет запрос

            // 3. Запрос информации о провайдере через резервное HTTPS API
            let ispName = "Определен автоматически";
            let locationName = "Определено по базовой станции";
            let ipTimeZone = "";

            try {
                const infoResponse = await fetch(`https://ipapi.co/${userIp}/json/`);
                if (infoResponse.ok) {
                    const info = await infoResponse.json();
                    ispName = info.org || info.asn || ispName;
                    locationName = `${info.city || ''}, ${info.country_name || ''}`;
                    ipTimeZone = info.timezone;
                }
            } catch (e) {
                // Если базу провайдеров заблокировал AdBlock, берем инфо из Cloudflare
                ispName = "Защищенное соединение (Cloudflare)";
                locationName = "Определено по региону " + data.loc;
            }

            // 4. ЖЕСТКАЯ ПРОВЕРКА НА VPN
            const deviceTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const orgLower = ispName.toLowerCase();
            
            // Признаки включенного VPN:
            const vpnByTimezone = ipTimeZone && (deviceTimeZone !== ipTimeZone);
            const vpnByProvider = orgLower.includes('vpn') || orgLower.includes('hosting') || orgLower.includes('servers') || orgLower.includes('datacenter');
            
            // Если включен VPN — перекрываем экран предупреждением
            if (vpnByTimezone || vpnByProvider) {
                showAlert("⚠️ Обнаружен включенный VPN!<br>Пожалуйста, выключите VPN, чтобы всё работало нормально.");
                return;
            }

            // Если всё отлично, выводим данные на экран
            document.getElementById('ip').innerText = userIp;
            document.getElementById('isp').innerText = ispName;
            document.getElementById('location').innerText = locationName;
            
            document.querySelectorAll('.value').forEach(el => el.classList.remove('loading'));

        } catch (error) {
            console.error(error);
            showAlert("❌ Ошибка соединения.<br>Запрос заблокирован вашим брандмауэром или провайдером.");
        }
    }

    // Следим за сетью в реальном времени
    window.addEventListener('online', checkNetworkAndIp);
    window.addEventListener('offline', () => {
        showAlert("❌ Интернет отсутствует!<br>Проверьте подключение к сети.");
    });

    // Старт при загрузке страницы
    window.onload = checkNetworkAndIp;
</script>

</body>
</html>
